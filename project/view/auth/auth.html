<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow — Авторизация</title>
    <link rel="stylesheet" href="auth.css">

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div href="/" class="logo-link">
                <div class="auth-logo">
                    <img src="../img/LogoPNG.png" alt="Logo" class="nav-logo">
                    <span>StudyFlow</span>
                </div>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Вход</button>
                <button class="auth-tab" data-tab="register" onclick="switchTab('register')">Регистрация</button>
            </div>

            <div id="login-form" class="auth-form active">
                <div class="form-group">
                    <label>Email или username</label>
                    <input type="text" id="login-username" placeholder="Введите email или username">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="Введите пароль">
                </div>
                <button class="auth-btn" id="login-btn">Войти</button>
                <div class="auth-footer">
                    <a href="#" onclick="switchTab('register')">Нет аккаунта? Зарегистрируйтесь</a>
                </div>
            </div>

            <div id="register-form" class="auth-form">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="reg-username" placeholder="Придумайте username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="Введите email">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="reg-password" placeholder="Придумайте пароль">
                </div>
                <div class="form-group">
                    <label>Подтверждение пароля</label>
                    <input type="password" id="reg-confirm" placeholder="Повторите пароль">
                </div>
                <button class="auth-btn" id="register-btn">Зарегистрироваться</button>
                <div class="auth-footer">
                    <a href="#" onclick="switchTab('login')">Уже есть аккаунт? Войдите</a>
                </div>
            </div>

            <div id="error-message" class="error-message"></div>
        </div>
    </div>
