                    </div>
                    <div class="settings-item">

            <h3>➕ Добавить друга</h3>
            <div class="form-group">
                <label>Username друга</label>
                <input type="text" id="friend-username" placeholder="Введите username">
            </div>
            <div class="modal-buttons">
                <button class="save-btn" onclick="addFriend()">Добавить</button>
                <button class="cancel-btn" onclick="closeAddFriendModal()">Отмена</button>
            </div>
        </div>
    </div>

            <h3>📷 Сменить аватар</h3>
            <div class="avatar-options">

                </div>
                <div class="avatar-option" onclick="setAvatar('https://i.pravatar.cc/150?img=2')">
